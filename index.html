<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vertical Slider</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="font-opensans h-screen">
    <div id="slider-container" class="relative overflow-hidden w-screen h-screen">
      <div id="slide-left" class="h-[100%] w-[35%] absolute top-0 left-0 duration-[0.5s] ease-in-out">
        <div
          class="bg-[#FD3555] h-[100%] w-[100%] flex flex-col items-center justify-center text-white"
        >
          <h1 class="text-[40px] mb-[10px] -mt-[30px]">Nature flower</h1>
          <p>all in pink</p>
        </div>

        <div
          class="bg-[#2A68BA] h-[100%] w-[100%] flex flex-col items-center justify-center text-white"
        >
          <h1 class="text-[40px] mb-[10px] -mt-[30px]">Bluuue Sky</h1>
          <p>With it's mountains</p>
        </div>

        <div
          class="bg-[#252E33] h-[100%] w-[100%] flex flex-col items-center justify-center text-white"
        >
          <h1 class="text-[40px] mb-[10px] -mt-[30px]">Lonely castle</h1>
          <p>in the wilderness</p>
        </div>

        <div
          class="bg-[#FFB866] h-[100%] w-[100%] flex flex-col items-center justify-center text-white"
        >
          <h1 class="text-[40px] mb-[10px] -mt-[30px]">Flying eagle</h1>
          <p>in the sunset</p>
        </div>
      </div>
      <div id="slide-right" class="h-[100%] absolute top-0 left-[35%] w-[65%] duration-[0.5s] ease-in-out">
        <div
          class="bg-no-repeat bg-cover bg-center h-[100%] w-[100%] bg-[url('https://images.unsplash.com/photo-1508768787810-6adc1f613514?ixlib=rb-0.3.5&ixid=eyJhcHBfaWQiOjEyMDd9&s=e27f6661df21ed17ab5355b28af8df4e&auto=format&fit=crop&w=1350&q=80')]"
        ></div>
        <div
          class="bg-no-repeat bg-cover bg-center h-[100%] w-[100%] bg-[url('https://images.unsplash.com/photo-1519981593452-666cf05569a9?ixlib=rb-0.3.5&ixid=eyJhcHBfaWQiOjEyMDd9&s=90ed8055f06493290dad8da9584a13f7&auto=format&fit=crop&w=715&q=80')]"
        ></div>
        <div
          class="bg-no-repeat bg-cover bg-center h-[100%] w-[100%] bg-[url('https://images.unsplash.com/photo-1486899430790-61dbf6f6d98b?ixlib=rb-0.3.5&ixid=eyJhcHBfaWQiOjEyMDd9&s=8ecdee5d1b3ed78ff16053b0227874a2&auto=format&fit=crop&w=1002&q=80')]"
        ></div>
        <div
          class="bg-no-repeat bg-cover bg-center h-[100%] w-[100%] bg-[url('https://images.unsplash.com/photo-1510942201312-84e7962f6dbb?ixlib=rb-0.3.5&ixid=eyJhcHBfaWQiOjEyMDd9&s=da4ca7a78004349f1b63f257e50e4360&auto=format&fit=crop&w=1050&q=80')]"
        ></div>
      </div>
      <div class="action-buttons">
        <button id="down-button"
          class="absolute left-[35%] top-[50%] z-[100] -translate-x-[100%] focus:outline-none hover:text-[#222] p-[15px] text-[16px] cursor-pointer bg-white text-[#aaa] border-none rounded-tl-[5px] rounded-bl-[5px]"
        >
          <i class="fas fa-arrow-down"></i>
        </button>
        <button id="up-button"
          class="absolute left-[35%] top-[50%] z-[100] -translate-y-[100%] focus:outline-none hover:text-[#222] p-[15px] text-[16px] cursor-pointer bg-white text-[#aaa] border-none rounded-tr-[5px] rounded-br-[5px]"
        >
          <i class="fas fa-arrow-up"></i>
        </button>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
